<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Boston Pipe Pros – Admin</title>
    <link rel="icon" href="/assets/img/favicon.ico">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <style>
      html,body{height:100%}
      body{margin:0;background:#ffffff;color:#0f172a;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .fallback{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
      .fallback .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#0b3d91;border-radius:50%;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .hint{font-size:14px;color:#334155}
      .btn{display:inline-block;padding:10px 14px;border-radius:10px;border:2px solid #0b3d91;color:#0b3d91;font-weight:700;text-decoration:none}
    </style>
  </head>
  <body>
    <div id="cms-fallback" class="fallback">
      <div class="spinner" aria-hidden="true"></div>
      <div>Loading Admin…</div>
      <div class="hint">If this screen doesn't change in a few seconds, click the button below to open the login panel.</div>
      <a id="open-login" class="btn" href="#">Open Login</a>
    </div>
    <script>
      (function(){
        function openLogin(){
          if (window.netlifyIdentity) {
            window.netlifyIdentity.open('login');
          }
        }
        document.getElementById('open-login').addEventListener('click', function(e){ e.preventDefault(); openLogin(); });
        setTimeout(openLogin, 3500);
        document.addEventListener('DOMContentLoaded', function(){
          var check = setInterval(function(){
            if (document.getElementById('nc-root')){
              var fb = document.getElementById('cms-fallback');
              if (fb) fb.style.display = 'none';
              clearInterval(check);
            }
          }, 500);
        });
      })();
    </script>
  </body>
</html>
