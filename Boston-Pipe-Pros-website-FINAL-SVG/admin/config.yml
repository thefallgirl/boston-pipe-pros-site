
backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

site_url: "https://bostonpipepros.com"
logo_url: "/assets/img/logo.png"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Body (HTML)", name: "body", widget: "code", default_language: "html" }

  - name: "blog_index"
    label: "Blog Index Page"
    files:
      - label: "Blog Index"
        name: "blog_home"
        file: "blog/index.html"
        fields:
          - { label: "Intro Heading", name: "intro_heading", widget: "string", required: false }
          - { label: "Intro Text", name: "intro_text", widget: "text", required: false }
          - { label: "Raw HTML List", name: "body", widget: "code", default_language: "html" }

  - name: "site_copy"
    label: "Site Copy"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.html"
        fields:
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string", required: false }
          - { label: "Body (HTML)", name: "body", widget: "code", default_language: "html" }
